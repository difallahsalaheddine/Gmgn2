<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#9945FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GMGN Import">
<title>GMGN Bulk Import</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;700&display=swap');
  :root { --bg:#0a0f1e;--surface:#111827;--border:#1e293b;--accent:#9945FF;--accent2:#14F195;--text:#e2e8f0;--muted:#64748b; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;padding:20px 16px;}
  .header{text-align:center;margin-bottom:20px;}
  .header h1{font-size:21px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px;}
  .header p{color:var(--muted);font-size:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
  .card-title{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:10px;}
  textarea,select,input[type="text"]{width:100%;background:#0d1424;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;padding:10px;outline:none;}
  textarea{font-family:'IBM Plex Mono',monospace;font-size:11px;resize:none;line-height:1.6;}
  textarea:focus,input:focus,select:focus{border-color:var(--accent);}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
  label{font-size:12px;color:var(--muted);white-space:nowrap;}
  .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-bottom:14px;}
  .btn-main:active{opacity:0.8;}
  .btn-copy{background:linear-gradient(135deg,var(--accent2),#059669);color:#000;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;}
  #outputArea{width:100%;background:#0d1424;border:1px solid var(--accent2);border-radius:8px;color:#14F195;font-family:'IBM Plex Mono',monospace;font-size:10.5px;padding:10px;min-height:100px;line-height:1.7;outline:none;resize:none;}
  .stats{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .stats span{color:var(--accent2);font-weight:700;}
  .tip{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;}
  .tip b{color:var(--accent2);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent2);color:#000;font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;padding:10px 22px;border-radius:30px;transition:transform 0.3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="header">
  <h1>🟣 GMGN Bulk Import</h1>
  <p>حوّل عناوين Solana لصيغة gmgn.ai</p>
</div>
<div class="card">
  <div class="card-title">📥 الصق العناوين هنا</div>
  <textarea id="inputArea" rows="6" placeholder="الصق العناوين - سطر لكل عنوان"></textarea>
</div>
<div class="card">
  <div class="card-title">⚙️ إعدادات</div>
  <div class="row">
    <label>اسم:</label>
    <input type="text" id="defaultName" value="trader" style="flex:1">
  </div>
  <div class="row">
    <label>الصيغة:</label>
    <select id="formatType" style="flex:1">
      <option value="simple">بسيطة (address:name)</option>
      <option value="json">JSON كاملة</option>
    </select>
  </div>
</div>
<button class="btn-main" onclick="generate()">⚡ توليد الصيغة</button>
<div class="card" id="outputCard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div class="card-title" style="margin:0">📤 النتيجة</div>
    <button class="btn-copy" onclick="copyOutput()">📋 نسخ</button>
  </div>
  <div class="stats">العناوين: <span id="countOut">0</span></div>
  <textarea id="outputArea" readonly onclick="this.select();this.setSelectionRange(0,99999);"></textarea>
  <p class="tip"><b>اضغط على النص</b> لتحديده ثم انسخ</p>
</div>
<div class="toast" id="toast"></div>
<script>
function parseAddresses(raw){return raw.split(/[\n,\s]+/).map(s=>s.trim()).filter(s=>s.length>20&&/^[A-Za-z0-9]+$/.test(s));}
function generate(){
  const raw=document.getElementById('inputArea').value;
  const name=document.getElementById('defaultName').value.trim()||'trader';
  const fmt=document.getElementById('formatType').value;
  const addrs=parseAddresses(raw);
  if(addrs.length===0){showToast('⚠️ ما لقيت عناوين صالحة');return;}
  let output='';
  if(fmt==='simple'){output=addrs.map((a,i)=>`${a}:${name}${i+1}`).join(',\n');}
  else{const arr=addrs.map((a,i)=>({address:a,name:`${name}${i+1}`,emoji:"🟣",groups:["default"]}));output=JSON.stringify(arr,null,2);}
  document.getElementById('outputArea').value=output;
  document.getElementById('countOut').textContent=addrs.length;
  document.getElementById('outputCard').style.display='block';
  document.getElementById('outputCard').scrollIntoView({behavior:'smooth'});
  setTimeout(()=>{const ta=document.getElementById('outputArea');ta.select();ta.setSelectionRange(0,99999);},400);
}
function copyOutput(){
  const ta=document.getElementById('outputArea');
  ta.select();ta.setSelectionRange(0,99999);
  try{if(document.execCommand('copy')){showToast('✅ تم النسخ! الصقه في gmgn.ai');return;}}catch(e){}
  navigator.clipboard.writeText(ta.value).then(()=>showToast('✅ تم النسخ! الصقه في gmgn.ai')).catch(()=>showToast('⚠️ اضغط على النص وانسخ يدوياً'));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
